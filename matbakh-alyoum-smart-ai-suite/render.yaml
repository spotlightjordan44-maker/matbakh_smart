services:
  - type: web
    name: matbakh-alyoum-bot
    runtime: node
    plan: starter
    region: frankfurt
    branch: main
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: TIMEZONE
        value: Asia/Amman

export function isConfigured() {
  return Boolean(
    CONFIG.wa.accessToken &&
      CONFIG.wa.phoneNumberId &&
      CONFIG.wa.verifyToken &&
      CONFIG.supabase.url &&
      CONFIG.supabase.serviceRoleKey
  );
}
